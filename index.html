<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>payoo|Login</title>
  <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
  <!--tailwind+daysi-->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!--google font_Geist---->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!--font awesome cdn-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto pt-32">
  <div class="w-[80px] mx-auto mb-5">
    <img src="assets/github-logo.png" alt="">
  </div>
  <div class="text-center mx-auto">
    <h2 class="text-[18px] font-bold">GitHub Issues Tracker</h2>
    <p class="text-[10px] font-semibold">Sign in to manage your issues</p>
  </div>

  <div class="form pt-10">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">

      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold  text-[#1F2937]">Username</label>
          <input id="input_number" type="text" class="input rounded-full bg-base-200" value="admin"
            placeholder="Enter Username" />
          <br>
          <label class="label text-neutral font-bold  text-[#1F2937]">Password</label>
          <input id="input_pin" type="password" class="input rounded-full bg-base-200" placeholder="Enter Password" />
          <div> </div>
          <button id="signin_btn" class="btn btn-primary rounded-full mt-4">Sign In</button>
          <section class="text-center">
            <div class="">
              <h2 class="text-[13px] my-2 font-normal">OR</h2>
              <p class="text-[10px]">Demo Credentials:</p>
            </div>
            <div class="my-3">
              <p class="text-[14px]"><span class="font-semibold">Username:</span> admin</p>
              <p class="text-[14px]"><span class="font-semibold">Password:</span> admin123</p>
            </div>
          </section>
        </fieldset>
      </div>
    </div>
  </div>
  <script src="script/signin.js"></script>
</body>

</html>
