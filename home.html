<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <!--tailwind+daysi-->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!--google font_Geist---->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!--font awesome cdn-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body>
  <header>
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1 flex items-center gap-2">
        <img class="w-10" src="assets/github-logo.png" alt="">
        <p>GitHub Issues Tracker</p>
      </div>
      <div class="flex gap-2">
        <!-- <i class="fa-solid fa-magnifying-glass icon"></i> -->
        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto " />
        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
      </div>
    </div>
  </header>

  <section class="w-[80%] mx-auto my-20">
    <div id="level_container" class="bg-gray-100 p-4">
      <button id="allBtn" class="btn btn-soft btn-primary">All</button>
      <button id="openBtn" class="btn btn-soft btn-primary">Open</button>
      <button id="closedBtn" class="btn btn-soft btn-primary">Closed</button>
    </div>
  </section>

  <section class="w-[80%] mx-auto my-2 bg-gray-100 p-4">
    <div class="flex justify-between">
      <div class="flex gap-1 items-center">
        <div>
          <img src="assets/Aperture.png" alt="">
        </div>
        <div>
          <h2>50 Issues</h2>
          <p>Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-green-600 rounded-full"></div>
          <span>Open</span>
        </div>

        <div class="flex items-center gap-2">
          <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
          <span>Closed</span>
        </div>

      </div>
    </div>
  </section>

  <section id="cardContainer" class=" w-[80%] mx-auto grid grid-cols-3 gap-6 p-6">

    <!--Card-->

  </section>

  <script src="script/index.js"></script>
</body>

</html>
